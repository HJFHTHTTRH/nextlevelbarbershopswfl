<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Level Barbershop – TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2596be;
      --primary-glow: rgba(37,150,190,.4);
      --black: #0a0a0a;
      --dark2: #1a1a1a;
      --white: #f5f5f5;
      --gray: #999;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      overflow: hidden;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: rgba(10,10,10,.95);
      border-bottom: 1px solid rgba(37,150,190,.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 20;
    }
    .topbar-logo {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--white);
    }
    .topbar-logo span { color: var(--primary); }
    .topbar-info { display: flex; align-items: center; gap: 2rem; }
    .topbar-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .5px;
      color: rgba(245,245,245,.65);
    }
    .topbar-item svg {
      width: 14px; height: 14px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.8;
      flex-shrink: 0;
    }

    /* ── SLIDESHOW ── */
    .slideshow {
      position: fixed;
      top: 60px; bottom: 36px;
      left: 0; right: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* divider */
    .divider {
      position: fixed;
      top: 60px; bottom: 36px;
      left: 50%;
      width: 3px;
      background: linear-gradient(180deg, transparent 0%, var(--primary) 20%, var(--primary) 80%, transparent 100%);
      z-index: 10;
      opacity: .5;
    }
    .divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 12px; height: 12px;
      background: var(--primary);
      border-radius: 50%;
    }

    /* ── PANEL ── */
    .panel {
      position: relative;
      overflow: hidden;
      background: var(--dark2);
      /* GPU layer — evita repaints durante el fade */
      transform: translateZ(0);
    }

    /* corner accents */
    .corner {
      position: absolute;
      width: 22px; height: 22px;
      z-index: 4;
      pointer-events: none;
    }
    .corner--tl { top: 10px; left: 10px; border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .corner--tr { top: 10px; right: 10px; border-top: 2px solid var(--primary); border-right: 2px solid var(--primary); }
    .corner--bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .corner--br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary); }

    /* media — fade suave, GPU-composited */
    .panel-media {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      /* will-change le dice al browser que prepare una capa GPU para esta propiedad */
      will-change: opacity;
      transform: translateZ(0);
      transition: opacity .8s ease;
      z-index: 1;
    }
    .panel-media.active  { opacity: 1; }
    .panel-media.exiting { opacity: 0; }

    /* gradient overlay */
    .panel-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        rgba(10,10,10,.5) 0%,
        rgba(10,10,10,.05) 45%,
        rgba(10,10,10,.7) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* branding bottom */
    .panel-branding {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 3;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .brand-logo {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      letter-spacing: 2px;
      color: var(--white);
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }
    .brand-logo span { color: var(--primary); }
    .brand-sub {
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,245,245,.55);
      margin-top: .25rem;
    }
    .slide-num {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      color: rgba(37,150,190,.12);
      letter-spacing: 4px;
      line-height: 1;
      user-select: none;
    }

    /* placeholder */
    .placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 0;
    }
    .placeholder svg {
      width: 64px; height: 64px;
      stroke: rgba(37,150,190,.15);
      fill: none;
      stroke-width: 1;
    }

    /* ── BOTTOM BAR ── */
    .bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(10,10,10,.95);
      border-top: 1px solid rgba(37,150,190,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .8rem;
      z-index: 20;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
    }
    .dot.active {
      background: var(--primary);
      transform: scale(1.5);
    }

    /* progress bar */
    .progress {
      position: fixed;
      bottom: 36px; left: 0;
      height: 2px;
      background: var(--primary);
      width: 0%;
      z-index: 21;
    }
    .progress.animating {
      transition: width 8s linear;
      width: 100%;
    }

    /* loader */
    .loader {
      position: fixed; inset: 0;
      background: var(--black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      z-index: 100;
      transition: opacity .7s;
    }
    .loader.hide { opacity: 0; pointer-events: none; }
    .loader-logo {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 5px;
      color: var(--white);
    }
    .loader-logo span { color: var(--primary); }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(37,150,190,.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="loader-logo">NEXT LEVEL <span>BARBERSHOP</span></div>
  <div class="spinner"></div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">NEXT LEVEL <span>BARBERSHOP</span></div>
  <div class="topbar-info">
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      (239) 347-7992
    </div>
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      140 Santa Barbara Blvd S, Suite 118
    </div>
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="clock">--:--</span>
    </div>
  </div>
</div>

<!-- Divider -->
<div class="divider"></div>

<!-- Slideshow: 2 panels -->
<div class="slideshow">
  <div class="panel" id="panelA">
    <div class="placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
    <div class="panel-overlay"></div>
    <div class="corner corner--tl"></div><div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div><div class="corner corner--br"></div>
    <div class="panel-branding">
      <div>
        <div class="brand-logo">NEXT LEVEL <span>CUTS</span></div>
        <div class="brand-sub">Walk-ins Welcome · Cape Coral, FL</div>
      </div>
      <div class="slide-num" id="numA">01</div>
    </div>
  </div>

  <div class="panel" id="panelB">
    <div class="placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
    <div class="panel-overlay"></div>
    <div class="corner corner--tl"></div><div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div><div class="corner corner--br"></div>
    <div class="panel-branding">
      <div>
        <div class="brand-logo">NEXT LEVEL <span>CUTS</span></div>
        <div class="brand-sub">Walk-ins Welcome · Cape Coral, FL</div>
      </div>
      <div class="slide-num" id="numB">02</div>
    </div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress" id="progress"></div>

<!-- Bottom dots -->
<div class="bottombar" id="dots"></div>

<script>
  const INTERVAL   = 8000;  // ms entre slides
  const FADE_OUT   = 900;   // ms — esperar a que termine el fade-out antes de borrar
  const BASE_PATH  = '/images/cuts/';

  // ── WebP: archivos más livianos = carga más rápida ──
  const files = [
    'PHOTO-2026-03-25-10-53-52.webp','IMG_9067.webp','IMG_9936.webp','IMG_9835.webp',
    'IMG_0014.webp','IMG_9995.webp','IMG_0086.webp','IMG_0179.webp','IMG_0105.webp',
    'IMG_0360.webp','IMG_0565.webp','44f1fcfa-cbb8-43bd-8895-865989360410.webp',
    'd94baeb9-9762-4bcb-996c-548de174bf5d.webp','cae39957-a6b0-4812-8e63-ed55de8829b6.webp',
    'c712000c-c076-4417-957c-eaed72cc34a2.webp','275e03bc-9a04-4da9-9a59-239a411db7bb.webp',
    'a4a903bd-fad5-4177-abeb-037476e896d6.webp',
    'ec2eb1cf-fd80-4988-a5ce-8be31d9da084.webp','copy_7248CC17-4C2C-496B-8E89-0B85C3603F47.webp',
    'copy_802AA5CC-C893-4EEB-BA81-661093BA3870.webp','f480aeae-583b-4bee-80e3-4aa4a57b32b4.webp',
    'IMG_9747.webp','89661273-4de7-4729-98a7-6766125aafe1.webp',
    '1ef67bae-fc2b-4dab-a206-84023c7d4c7e.webp','85ab84e5-8f98-4a01-a1eb-695da8a8d4e4.webp',
    '3c670b17-eccc-404c-a8f3-d9d6beaf78b8.webp','84602367-2016-40ff-8286-05ed95bbfbe5.webp',
    'af971262-6319-4b8e-b1cc-0be6dd20509d.webp','a490c7a8-42df-413a-9618-d4819512e134.webp'
  ];

  let imgIdx   = 0;
  let panelTurn = 0;
  const dotCount = Math.min(Math.ceil(files.length / 2), 12);

  // ── Caché de preload: carga TODAS las imágenes al arrancar ──
  // Cuando el navegador ya tiene la imagen en caché, img.decode() es instantáneo
  const pool = {};
  function warmCache(filename) {
    if (pool[filename]) return;
    const img = new Image();
    img.decoding = 'async';
    img.src = BASE_PATH + filename;
    pool[filename] = img;
  }
  // Arranca la descarga de todo desde el primer momento
  files.forEach(warmCache);

  // ── Reloj ──
  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);

  // ── Barra de progreso ──
  const bar = document.getElementById('progress');
  function resetBar() {
    bar.classList.remove('animating');
    void bar.offsetWidth; // fuerza reflow para reiniciar la animación
    bar.classList.add('animating');
  }

  // ── Dots ──
  function buildDots() {
    const el = document.getElementById('dots');
    for (let i = 0; i < dotCount; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      el.appendChild(d);
    }
  }
  function updateDots(i) {
    document.querySelectorAll('.dot').forEach((d, j) => {
      d.classList.toggle('active', j === i % dotCount);
    });
  }

  // ── Swap de panel ──
  // La imagen nueva se decodifica (casi instantáneo desde caché) antes de hacer fade-in.
  // La imagen vieja no se borra hasta DESPUÉS de que la nueva sea visible → sin negro.
  function swapPanel(panel, filename, num) {
    const old = panel.querySelector('.panel-media.active');

    const img = document.createElement('img');
    img.className  = 'panel-media';
    img.alt        = '';
    img.decoding   = 'async';
    img.src        = BASE_PATH + filename;

    const branding = panel.querySelector('.panel-branding');
    panel.insertBefore(img, branding);

    const numEl = panel.querySelector('.slide-num');
    if (numEl) numEl.textContent = String(num).padStart(2,'0');

    // Decodificar → fade-in → luego sí quitamos la anterior
    const show = () => {
      requestAnimationFrame(() => {
        img.classList.add('active');
        if (old) {
          old.classList.remove('active');
          old.classList.add('exiting');
          // Esperar a que termine el fade-out antes de remover del DOM
          setTimeout(() => { if (old.parentNode) old.remove(); }, FADE_OUT);
        }
      });
    };

    img.decode().then(show).catch(show);
  }

  // ── Avanzar un panel ──
  function advance() {
    const panelId = panelTurn === 0 ? 'panelA' : 'panelB';
    const fi      = imgIdx % files.length;
    swapPanel(document.getElementById(panelId), files[fi], fi + 1);
    updateDots(Math.floor(imgIdx / 2));
    imgIdx++;
    panelTurn = 1 - panelTurn;
    resetBar();
  }

  // ── Esperar a que estén listas las primeras imágenes ──
  // Evita que el TV muestre negro al arrancar
  function waitForFirst(indices, callback) {
    let done = false;
    const finish = () => { if (!done) { done = true; callback(); } };

    // Timeout de seguridad: si tarda más de 6s, arranca igual
    const timeout = setTimeout(finish, 6000);

    const checks = indices.map(i => {
      const img = pool[files[i]];
      if (!img || img.complete) return Promise.resolve();
      return new Promise(res => { img.onload = res; img.onerror = res; });
    });

    Promise.all(checks).then(() => { clearTimeout(timeout); finish(); });
  }

  // ── Init ──
  function init() {
    buildDots();

    waitForFirst([0, 1], () => {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.classList.add('hide');
        setTimeout(() => loader.remove(), 800);
      }

      swapPanel(document.getElementById('panelA'), files[0], 1);
      // Panel B con pequeño delay para no saturar el decode al mismo tiempo
      setTimeout(() => swapPanel(document.getElementById('panelB'), files[1], 2), 350);

      imgIdx    = 2;
      panelTurn = 0;
      updateDots(0);
      resetBar();

      setInterval(advance, INTERVAL);
    });
  }

  init();
</script>
</body>
</html>
