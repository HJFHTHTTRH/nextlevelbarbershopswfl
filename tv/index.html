<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Level Barbershop – TV</title>
  <link rel="icon" href="../images/icon.webp" type="image/webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2596be;
      --primary-glow: rgba(37,150,190,.4);
      --black: #0a0a0a;
      --dark2: #141414;
      --dark3: #111111;
      --white: #f5f5f5;
      --gray: #999;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      overflow: hidden;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: rgba(10,10,10,.97);
      border-bottom: 1px solid rgba(37,150,190,.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 20;
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .topbar-logo img {
      height: 38px;
      width: auto;
    }
    .topbar-name {
      font-family: var(--font-display);
      font-size: 1.55rem;
      letter-spacing: 3px;
      color: var(--white);
    }
    .topbar-name span { color: var(--primary); }
    .topbar-info { display: flex; align-items: center; gap: 2rem; }
    .topbar-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .5px;
      color: rgba(245,245,245,.65);
    }
    .topbar-item svg {
      width: 14px; height: 14px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.8;
      flex-shrink: 0;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      position: fixed;
      top: 60px; bottom: 36px;
      left: 0; right: 0;
      display: flex;
    }

    /* ── LEFT: REVIEW PANEL ── */
    .review-panel {
      width: 40%;
      height: 100%;
      background: var(--dark3);
      border-right: 1px solid rgba(37,150,190,.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    /* subtle corner accents on review panel */
    .review-panel::before, .review-panel::after {
      content: '';
      position: absolute;
      width: 60px; height: 60px;
      border-color: rgba(37,150,190,.25);
      border-style: solid;
      pointer-events: none;
    }
    .review-panel::before {
      top: 16px; left: 16px;
      border-width: 2px 0 0 2px;
    }
    .review-panel::after {
      bottom: 16px; right: 16px;
      border-width: 0 2px 2px 0;
    }

    /* glow blob behind QR */
    .review-glow {
      position: absolute;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(37,150,190,.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .review-logo {
      width: 90px;
      height: auto;
      margin-bottom: 1.4rem;
      filter: drop-shadow(0 4px 16px rgba(37,150,190,.3));
    }

    .stars {
      display: flex;
      gap: .35rem;
      margin-bottom: 1.4rem;
    }
    .stars svg {
      width: 32px; height: 32px;
      fill: #f5a623;
      filter: drop-shadow(0 0 6px rgba(245,166,35,.5));
    }

    .review-heading {
      text-align: center;
      margin-bottom: 1rem;
    }
    .review-heading .en {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 3.5vw, 3.2rem);
      letter-spacing: 4px;
      color: var(--white);
      line-height: 1;
      display: block;
    }
    .review-heading .es {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 2.5vw, 2.1rem);
      letter-spacing: 3px;
      color: var(--primary);
      display: block;
      margin-top: .3rem;
    }

    /* Google badge */
    .google-badge {
      display: flex;
      align-items: center;
      gap: .55rem;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 50px;
      padding: .4rem 1rem;
      margin-bottom: 1.5rem;
    }
    .google-badge svg { width: 18px; height: 18px; flex-shrink: 0; }
    .google-badge span {
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(245,245,245,.7);
      text-transform: uppercase;
    }

    /* QR code */
    .qr-wrapper {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 1.4rem;
      box-shadow:
        0 0 0 1px rgba(37,150,190,.3),
        0 8px 40px rgba(0,0,0,.5),
        0 0 60px rgba(37,150,190,.12);
      position: relative;
      z-index: 1;
    }
    .qr-wrapper img {
      display: block;
      width: 300px;
      height: 300px;
      image-rendering: pixelated;
    }

    .review-sub {
      text-align: center;
    }
    .review-sub .line-en {
      font-size: clamp(.85rem, 1.2vw, 1rem);
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(245,245,245,.8);
      display: block;
    }
    .review-sub .line-es {
      font-size: clamp(.75rem, 1vw, .88rem);
      font-weight: 400;
      letter-spacing: .5px;
      color: rgba(245,245,245,.45);
      display: block;
      margin-top: .25rem;
    }

    /* ── RIGHT: PHOTO PANEL ── */
    .photo-panel {
      flex: 1;
      height: 100%;
      position: relative;
      background: var(--dark2);
      overflow: hidden;
    }

    /* corner accents on photo panel */
    .corner {
      position: absolute;
      width: 22px; height: 22px;
      z-index: 4;
      pointer-events: none;
    }
    .corner--tl { top: 10px; left: 10px; border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .corner--tr { top: 10px; right: 10px; border-top: 2px solid var(--primary); border-right: 2px solid var(--primary); }
    .corner--bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .corner--br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary); }

    /* blurred bg fill */
    .panel-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      filter: blur(18px) brightness(.45) saturate(1.2);
      transform: scale(1.08) translateZ(0);
      opacity: 0;
      will-change: opacity;
      transition: opacity .8s ease;
      z-index: 0;
    }
    .panel-bg.active  { opacity: 1; }
    .panel-bg.exiting { opacity: 0; }

    /* main photo */
    .panel-media {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      opacity: 0;
      will-change: opacity;
      transform: translateZ(0);
      transition: opacity .8s ease;
      z-index: 1;
    }
    .panel-media.active  { opacity: 1; }
    .panel-media.exiting { opacity: 0; }

    /* gradient overlay */
    .panel-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        rgba(10,10,10,.4) 0%,
        rgba(10,10,10,.02) 40%,
        rgba(10,10,10,.65) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* branding bottom-right corner of photo */
    .panel-branding {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 3;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .brand-logo {
      font-family: var(--font-display);
      font-size: clamp(1rem, 1.8vw, 1.5rem);
      letter-spacing: 2px;
      color: var(--white);
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }
    .brand-logo span { color: var(--primary); }
    .brand-sub {
      font-size: .6rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,245,245,.5);
      margin-top: .2rem;
    }
    .slide-num {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.5rem);
      color: rgba(37,150,190,.12);
      letter-spacing: 4px;
      line-height: 1;
      user-select: none;
    }

    /* placeholder when no image */
    .placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 0;
    }
    .placeholder svg {
      width: 64px; height: 64px;
      stroke: rgba(37,150,190,.15);
      fill: none;
      stroke-width: 1;
    }

    /* ── BOTTOM BAR ── */
    .bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(10,10,10,.97);
      border-top: 1px solid rgba(37,150,190,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .8rem;
      z-index: 20;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      transition: transform .3s, background .3s;
    }
    .dot.active {
      background: var(--primary);
      transform: scale(1.5);
    }

    /* progress bar — only on the right 60% */
    .progress {
      position: fixed;
      bottom: 36px;
      left: 40%;
      right: 0;
      height: 2px;
      background: var(--primary);
      width: 0%;
      z-index: 21;
      transform-origin: left;
    }
    .progress.animating {
      transition: width 8s linear;
      width: 100%;
    }

    /* loader */
    .loader {
      position: fixed; inset: 0;
      background: var(--black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      z-index: 100;
      transition: opacity .7s;
    }
    .loader.hide { opacity: 0; pointer-events: none; }
    .loader-logo {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 5px;
      color: var(--white);
    }
    .loader-logo span { color: var(--primary); }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(37,150,190,.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="loader-logo">NEXT LEVEL <span>BARBERSHOP</span></div>
  <div class="spinner"></div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">
    <img src="../images/icon.webp" alt="Next Level Barbershop">
    <div class="topbar-name">NEXT LEVEL <span>BARBERSHOP</span></div>
  </div>
  <div class="topbar-info">
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      (239) 347-7992
    </div>
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      140 Santa Barbara Blvd S, Suite 118
    </div>
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="clock">--:--</span>
    </div>
  </div>
</div>

<!-- Main layout -->
<div class="main">

  <!-- LEFT: Review CTA -->
  <div class="review-panel">
    <div class="review-glow"></div>

    <img class="review-logo" src="../images/icon.webp" alt="Next Level Barbershop">

    <div class="stars">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>

    <div class="review-heading">
      <span class="en">LEAVE US A REVIEW</span>
      <span class="es">DÉJANOS UNA RESEÑA</span>
    </div>

    <!-- Google badge -->
    <div class="google-badge">
      <!-- Google "G" logo -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Google Reviews</span>
    </div>

    <!-- QR Code -->
    <div class="qr-wrapper">
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=0&data=https://www.google.com/maps/place/Next+Level+Barber+Shop/%4026.6484882,-81.9779236,17z/data%3D!3m1!4b1!4m6!3m5!1s0x88db47fc4572d10d:0xff912e4554887962!8m2!3d26.6484834!4d-81.9753487!16s%252Fg%252F11kqlnl8ps%3Fentry%3Dttu"
        alt="QR Code – Google Review"
        id="qr-img"
      >
    </div>

    <div class="review-sub">
      <span class="line-en">Scan to leave a review</span>
      <span class="line-es">Escanea para dejar una reseña</span>
    </div>
  </div>

  <!-- RIGHT: Photo Slideshow -->
  <div class="photo-panel" id="photoPanel">
    <div class="placeholder">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    </div>
    <div class="panel-overlay"></div>
    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>
    <div class="panel-branding">
      <div>
        <div class="brand-logo">NEXT LEVEL <span>CUTS</span></div>
        <div class="brand-sub">Walk-ins Welcome · Cape Coral, FL</div>
      </div>
      <div class="slide-num" id="slideNum">01</div>
    </div>
  </div>

</div>

<!-- Progress bar -->
<div class="progress" id="progress"></div>

<!-- Bottom dots -->
<div class="bottombar" id="dots"></div>

<script>
  // ── CONFIG ──
  const INTERVAL  = 8000;   // ms between slides
  const FADE_OUT  = 900;    // ms fade duration
  const BASE_PATH = '../images/cuts/';

  // ── REPLACE THIS with your actual Google Review URL ──
  // Example: https://g.page/r/YOUR_PLACE_ID/review
  // const GOOGLE_REVIEW_URL = 'https://g.page/r/YOUR_PLACE_ID/review';

  let files   = [];
  let imgIdx  = 0;
  let dotCount = 0;

  // Image pre-load cache
  const pool = {};
  function warmCache(filename) {
    if (pool[filename]) return;
    const img = new Image();
    img.decoding = 'async';
    img.src = BASE_PATH + filename;
    pool[filename] = img;
  }

  // ── Clock ──
  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);

  // ── Progress bar ──
  const bar = document.getElementById('progress');
  function resetBar() {
    bar.classList.remove('animating');
    void bar.offsetWidth;
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.classList.add('animating');
  }

  // ── Dots ──
  function buildDots() {
    const el = document.getElementById('dots');
    dotCount = Math.min(files.length, 16);
    for (let i = 0; i < dotCount; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      el.appendChild(d);
    }
  }
  function updateDots(i) {
    document.querySelectorAll('.dot').forEach((d, j) => {
      d.classList.toggle('active', j === i % dotCount);
    });
  }

  // ── Swap photo ──
  function swapPhoto(filename, num) {
    const panel = document.getElementById('photoPanel');
    const oldMedia = panel.querySelector('.panel-media.active');
    const oldBg    = panel.querySelector('.panel-bg.active');
    const src = BASE_PATH + filename;

    const bg = document.createElement('img');
    bg.className = 'panel-bg';
    bg.alt = '';
    bg.decoding = 'async';
    bg.src = src;

    const img = document.createElement('img');
    img.className = 'panel-media';
    img.alt = '';
    img.decoding = 'async';
    img.src = src;

    const branding = panel.querySelector('.panel-branding');
    panel.insertBefore(bg,  branding);
    panel.insertBefore(img, branding);

    const numEl = document.getElementById('slideNum');
    if (numEl) numEl.textContent = String(num).padStart(2,'0');

    const show = () => {
      requestAnimationFrame(() => {
        bg.classList.add('active');
        img.classList.add('active');
        [oldMedia, oldBg].forEach(el => {
          if (!el) return;
          el.classList.remove('active');
          el.classList.add('exiting');
          setTimeout(() => { if (el.parentNode) el.remove(); }, FADE_OUT);
        });
      });
    };
    img.decode().then(show).catch(show);
  }

  // ── Advance ──
  function advance() {
    const fi = imgIdx % files.length;
    swapPhoto(files[fi], fi + 1);
    updateDots(imgIdx % dotCount);
    imgIdx++;
    resetBar();
  }

  // ── Wait for first image before hiding loader ──
  function waitForFirst(callback) {
    let done = false;
    const finish = () => { if (!done) { done = true; callback(); } };
    const timeout = setTimeout(finish, 6000);
    const img = pool[files[0]];
    if (!img || img.complete) { clearTimeout(timeout); finish(); return; }
    img.onload = () => { clearTimeout(timeout); finish(); };
    img.onerror = () => { clearTimeout(timeout); finish(); };
  }

  // ── Init ──
  function start() {
    files.forEach(warmCache);
    buildDots();

    waitForFirst(() => {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.classList.add('hide');
        setTimeout(() => loader.remove(), 800);
      }
      swapPhoto(files[0], 1);
      imgIdx = 1;
      updateDots(0);
      resetBar();
      setInterval(advance, INTERVAL);
    });
  }

  // Lista de fotos embebida — no necesita fetch (funciona con file://)
  files = ["1.webp","2.webp","3.webp","4.webp","5.webp","6.webp","7.webp","8.webp","9.webp","10.webp","11.webp","12.webp","13.webp","14.webp","15.webp","16.webp","17.webp","18.webp","19.webp","20.webp","21.webp","22.webp","23.webp","24.webp"];
  start();
</script>
</body>
</html>
