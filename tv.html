<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Level Barbershop – TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2596be;
      --primary-glow: rgba(37,150,190,.4);
      --black: #0a0a0a;
      --dark2: #1a1a1a;
      --white: #f5f5f5;
      --gray: #999;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      overflow: hidden;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: rgba(10,10,10,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(37,150,190,.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 20;
    }
    .topbar-logo {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--white);
    }
    .topbar-logo span { color: var(--primary); }
    .topbar-info {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .topbar-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .5px;
      color: rgba(245,245,245,.65);
    }
    .topbar-item svg {
      width: 14px; height: 14px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 1.8;
      flex-shrink: 0;
    }

    /* ── SLIDESHOW ── */
    .slideshow {
      position: fixed;
      top: 60px; bottom: 36px;
      left: 0; right: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* divider */
    .divider {
      position: fixed;
      top: 60px; bottom: 36px;
      left: 50%;
      width: 3px;
      background: linear-gradient(180deg, transparent 0%, var(--primary) 20%, var(--primary) 80%, transparent 100%);
      z-index: 10;
      opacity: .5;
    }
    .divider::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 12px; height: 12px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--primary-glow), 0 0 40px var(--primary-glow);
    }

    /* ── PANEL ── */
    .panel {
      position: relative;
      overflow: hidden;
      background: var(--dark2);
    }

    /* corner accents */
    .corner {
      position: absolute;
      width: 22px; height: 22px;
      z-index: 4;
      pointer-events: none;
    }
    .corner--tl { top: 10px; left: 10px; border-top: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .corner--tr { top: 10px; right: 10px; border-top: 2px solid var(--primary); border-right: 2px solid var(--primary); }
    .corner--bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--primary); border-left: 2px solid var(--primary); }
    .corner--br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--primary); border-right: 2px solid var(--primary); }

    /* media */
    .panel-media {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.06);
      transition: opacity .9s ease, transform 7s ease-out;
      z-index: 1;
    }
    .panel-media.active {
      opacity: 1;
      transform: scale(1);
    }
    .panel-media.exit {
      opacity: 0;
      transform: scale(1.03);
    }

    /* gradient overlay */
    .panel-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        rgba(10,10,10,.5) 0%,
        rgba(10,10,10,.05) 45%,
        rgba(10,10,10,.7) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* branding bottom */
    .panel-branding {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 3;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .brand-logo {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      letter-spacing: 2px;
      color: var(--white);
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }
    .brand-logo span { color: var(--primary); }
    .brand-sub {
      font-size: .65rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(245,245,245,.55);
      margin-top: .25rem;
    }
    .slide-num {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      color: rgba(37,150,190,.12);
      letter-spacing: 4px;
      line-height: 1;
      user-select: none;
    }

    /* placeholder */
    .placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 0;
    }
    .placeholder svg {
      width: 64px; height: 64px;
      stroke: rgba(37,150,190,.15);
      fill: none;
      stroke-width: 1;
    }

    /* ── BOTTOM BAR ── */
    .bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(10,10,10,.92);
      border-top: 1px solid rgba(37,150,190,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .8rem;
      z-index: 20;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      transition: all .4s;
    }
    .dot.active {
      background: var(--primary);
      transform: scale(1.5);
      box-shadow: 0 0 8px var(--primary-glow);
    }

    /* progress bar */
    .progress {
      position: fixed;
      bottom: 36px; left: 0;
      height: 2px;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary-glow);
      width: 0%;
      z-index: 21;
      transition: none;
    }
    .progress.animating {
      transition: width 7s linear;
      width: 100%;
    }

    /* loader */
    .loader {
      position: fixed; inset: 0;
      background: var(--black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5rem;
      z-index: 100;
      transition: opacity .7s;
    }
    .loader.hide { opacity: 0; pointer-events: none; }
    .loader-logo {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 5px;
      color: var(--white);
    }
    .loader-logo span { color: var(--primary); }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(37,150,190,.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loader -->
<div class="loader" id="loader">
  <div class="loader-logo">NEXT LEVEL <span>BARBERSHOP</span></div>
  <div class="spinner"></div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-logo">NEXT LEVEL <span>BARBERSHOP</span></div>
  <div class="topbar-info">
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      (239) 347-7992
    </div>
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      140 Santa Barbara Blvd S, Suite 118
    </div>
    <div class="topbar-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="clock">--:--</span>
    </div>
  </div>
</div>

<!-- Divider -->
<div class="divider"></div>

<!-- Slideshow: 2 panels -->
<div class="slideshow">
  <div class="panel" id="panelA">
    <div class="placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
    <div class="panel-overlay"></div>
    <div class="corner corner--tl"></div><div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div><div class="corner corner--br"></div>
    <div class="panel-branding">
      <div>
        <div class="brand-logo">NEXT LEVEL <span>CUTS</span></div>
        <div class="brand-sub">Walk-ins Welcome · Cape Coral, FL</div>
      </div>
      <div class="slide-num" id="numA">01</div>
    </div>
  </div>

  <div class="panel" id="panelB">
    <div class="placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>
    <div class="panel-overlay"></div>
    <div class="corner corner--tl"></div><div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div><div class="corner corner--br"></div>
    <div class="panel-branding">
      <div>
        <div class="brand-logo">NEXT LEVEL <span>CUTS</span></div>
        <div class="brand-sub">Walk-ins Welcome · Cape Coral, FL</div>
      </div>
      <div class="slide-num" id="numB">02</div>
    </div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress" id="progress"></div>

<!-- Bottom dots -->
<div class="bottombar" id="dots"></div>

<script>
  const INTERVAL = 7000;
  const VID_EXTS = ['mp4','mov','webm'];

  let files = [];
  let idx = 0;
  let dotCount = 0;

  // Clock
  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }
  tick();
  setInterval(tick, 1000);

  // Progress bar
  const bar = document.getElementById('progress');
  function resetBar() {
    bar.classList.remove('animating');
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.classList.add('animating');
  }

  // Dots
  function buildDots(n) {
    const el = document.getElementById('dots');
    el.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      el.appendChild(d);
    }
  }
  function updateDots(pairIdx) {
    document.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === pairIdx % dotCount);
    });
  }

  // Create media element
  function makeMedia(filename) {
    const ext = filename.split('.').pop().toLowerCase();
    const src = '/images/cuts/' + filename;
    let el;
    if (VID_EXTS.includes(ext)) {
      el = document.createElement('video');
      el.src = src;
      el.autoplay = true;
      el.muted = true;
      el.loop = true;
      el.playsInline = true;
    } else {
      el = document.createElement('img');
      el.src = src;
      el.alt = 'Next Level Barbershop';
    }
    el.className = 'panel-media';
    return el;
  }

  // Swap one panel
  function swapPanel(panel, filename, num) {
    // Fade out old
    const old = panel.querySelector('.panel-media.active');
    if (old) {
      old.classList.remove('active');
      old.classList.add('exit');
      setTimeout(() => old.remove(), 1200);
    }
    // Add new
    const med = makeMedia(filename);
    const branding = panel.querySelector('.panel-branding');
    panel.insertBefore(med, branding);
    // Update number
    const numEl = panel.querySelector('.slide-num');
    if (numEl) numEl.textContent = String(num).padStart(2,'0');
    // Activate after reflow
    requestAnimationFrame(() => requestAnimationFrame(() => med.classList.add('active')));
  }

  // Show current pair
  function showPair() {
    const iA = idx % files.length;
    const iB = (idx + 1) % files.length;
    swapPanel(document.getElementById('panelA'), files[iA], iA + 1);
    setTimeout(() => swapPanel(document.getElementById('panelB'), files[iB], iB + 1), 180);
    updateDots(Math.floor(idx / 2));
    resetBar();
  }

  function next() {
    idx = (idx + 2) % files.length;
    showPair();
  }

  // Init
  function init() {
    files = [
      'PHOTO-2026-03-25-10-53-52.jpg','IMG_9067.jpg','IMG_9936.jpg','IMG_9835.jpg',
      'IMG_0014.jpg','IMG_9995.jpg','IMG_0086.jpg','IMG_0179.jpg','IMG_0105.jpg',
      'IMG_0360.jpg','IMG_0565.jpg','44f1fcfa-cbb8-43bd-8895-865989360410.jpg',
      'd94baeb9-9762-4bcb-996c-548de174bf5d.jpg','cae39957-a6b0-4812-8e63-ed55de8829b6.jpg',
      'c712000c-c076-4417-957c-eaed72cc34a2.jpg','275e03bc-9a04-4da9-9a59-239a411db7bb.jpg',
      '44bbd053-026f-4709-b59a-a75664370b95.jpg','a4a903bd-fad5-4177-abeb-037476e896d6.jpg',
      'ec2eb1cf-fd80-4988-a5ce-8be31d9da084.jpg','copy_7248CC17-4C2C-496B-8E89-0B85C3603F47.jpg',
      'copy_802AA5CC-C893-4EEB-BA81-661093BA3870.jpg','f480aeae-583b-4bee-80e3-4aa4a57b32b4.jpg',
      'IMG_9747.jpg','89661273-4de7-4729-98a7-6766125aafe1.jpg',
      '1ef67bae-fc2b-4dab-a206-84023c7d4c7e.jpg','85ab84e5-8f98-4a01-a1eb-695da8a8d4e4.jpg',
      '3c670b17-eccc-404c-a8f3-d9d6beaf78b8.jpg','84602367-2016-40ff-8286-05ed95bbfbe5.jpg',
      'af971262-6319-4b8e-b1cc-0be6dd20509d.jpg','a490c7a8-42df-413a-9618-d4819512e134.jpg',
      'IMG_0034.mov','IMG_0530.mov','IMG_0571.mov','49f628212c564299a1e4a35c53f9fe82.mov','IMG_0586.mov'
    ];

    if (files.length === 0) {
      document.getElementById('loader').innerHTML =
        '<div style="color:#999;font-family:Outfit,sans-serif;font-size:.9rem;letter-spacing:1px">No images found in images/cuts/</div>';
      return;
    }

    // Need at least 2 entries to fill both panels
    while (files.length < 2) files = [...files, ...files];

    dotCount = Math.min(Math.ceil(files.length / 2), 12);
    buildDots(dotCount);

    // Hide loader
    const loader = document.getElementById('loader');
    loader.classList.add('hide');
    setTimeout(() => loader.remove(), 800);

    showPair();
    setInterval(next, INTERVAL);
  }

  init();

</script>
</body>
</html>
